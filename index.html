<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的 Claude 翻译官</title>
    <style>
        body { font-family: 'PingFang SC', sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 400px; }
        h2 { color: #333; text-align: center; }
        textarea { width: 100%; height: 120px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; box-sizing: border-box; font-size: 16px; margin-bottom: 15px; resize: none; }
        button { width: 100%; padding: 12px; background-color: #d97757; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #c4623d; }
        #result { margin-top: 20px; padding: 15px; background: #fdf0eb; border-radius: 8px; min-height: 50px; color: #d97757; font-size: 16px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Claude 翻译官</h2>
        <textarea id="inputText" placeholder="输入你想翻译的中文..."></textarea>
        <button onclick="sendToAI()" id="btn">立即翻译</button>
        <div id="result" style="display: none;"></div>
    </div>

    <script>
        async function sendToAI() {
            const text = document.getElementById('inputText').value;
            const resDiv = document.getElementById('result');
            const btn = document.getElementById('btn');

            if (!text) return alert("请输入内容");

            resDiv.style.display = "block";
            resDiv.innerText = "Claude 正在思考...";
            btn.disabled = true;

            try {
                const response = await fetch('https://t-dbdd-production.up.railway.app/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                
                const data = await response.json();
                resDiv.innerText = data.result;
            } catch (error) {
                resDiv.innerText = "错误: 无法连接到后端，请确保 app.py 正在运行。";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
