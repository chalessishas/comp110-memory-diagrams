<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Translator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f6f1eb;
            --card: #fffcf8;
            --accent: #c8553d;
            --accent-light: #e8a490;
            --accent-bg: #fdf0eb;
            --text: #2c2420;
            --text-muted: #8a7e76;
            --border: #e8ddd4;
            --shadow: 0 12px 48px rgba(44,36,32,0.08), 0 2px 8px rgba(44,36,32,0.04);
            --radius: 14px;
            --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', 'Noto Sans SC', 'Noto Sans JP', 'Noto Sans KR', sans-serif;
            background-color: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 60px 20px 40px;
            color: var(--text);
            position: relative;
            overflow-x: hidden;
        }

        /* Decorative background grain */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* Floating decorative orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 { width: 400px; height: 400px; background: var(--accent-light); top: -100px; right: -80px; }
        .orb-2 { width: 300px; height: 300px; background: #d4c4a8; bottom: -60px; left: -60px; }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            animation: fadeUp 0.6s ease-out both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            padding: 0 4px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--accent), #e07a5f);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            box-shadow: 0 4px 16px rgba(200,85,61,0.25);
        }

        .logo h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 26px;
            font-weight: 400;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .lang-toggle {
            position: relative;
        }

        .lang-btn {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 13px;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .lang-btn:hover { border-color: var(--accent-light); color: var(--accent); }

        .lang-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: var(--shadow);
            overflow: hidden;
            z-index: 20;
            min-width: 120px;
        }

        .lang-dropdown.open { display: block; animation: dropIn 0.15s ease-out; }

        @keyframes dropIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lang-dropdown button {
            display: block;
            width: 100%;
            padding: 10px 16px;
            background: none;
            border: none;
            text-align: left;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            color: var(--text);
            cursor: pointer;
            transition: var(--transition);
        }

        .lang-dropdown button:hover { background: var(--accent-bg); color: var(--accent); }

        /* Card */
        .card {
            background: var(--card);
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .card-body { padding: 28px; }

        /* Textarea */
        .input-group { position: relative; margin-bottom: 20px; }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            height: 140px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            font-family: 'Outfit', 'Noto Sans SC', 'Noto Sans JP', sans-serif;
            font-size: 16px;
            line-height: 1.6;
            color: var(--text);
            background: transparent;
            resize: none;
            transition: var(--transition);
            outline: none;
        }

        textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,85,61,0.08); }
        textarea::placeholder { color: var(--text-muted); font-weight: 300; }

        .char-count {
            position: absolute;
            bottom: 12px;
            right: 14px;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Controls row */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .select-wrap {
            flex: 1;
            position: relative;
        }

        .select-wrap select {
            width: 100%;
            padding: 12px 36px 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-family: 'Outfit', 'Noto Sans SC', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            background: transparent;
            appearance: none;
            cursor: pointer;
            transition: var(--transition);
            outline: none;
        }

        .select-wrap select:focus { border-color: var(--accent); }

        .select-wrap::after {
            content: '▾';
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 12px;
            pointer-events: none;
        }

        .mic-btn {
            width: 48px;
            height: 48px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            background: transparent;
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .mic-btn:hover { border-color: var(--accent-light); background: var(--accent-bg); }

        .mic-btn.recording {
            border-color: #e74c3c;
            background: #fef2f2;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.2); }
            50% { box-shadow: 0 0 0 8px rgba(231,76,60,0); }
        }

        /* Translate button */
        .translate-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), #e07a5f);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-family: 'Outfit', 'Noto Sans SC', sans-serif;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .translate-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(200,85,61,0.3); }
        .translate-btn:active { transform: translateY(0); }
        .translate-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Result area */
        .result-area {
            display: none;
            margin-top: 2px;
            border-top: 1px solid var(--border);
            padding: 24px 28px;
            background: linear-gradient(180deg, var(--accent-bg) 0%, var(--card) 100%);
            position: relative;
        }

        .result-area.visible { display: block; animation: resultIn 0.35s ease-out; }

        @keyframes resultIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .result-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
        }

        .copy-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 12px;
            font-family: 'Outfit', sans-serif;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
        }

        .copy-btn:hover { border-color: var(--accent-light); color: var(--accent); }
        .copy-btn.copied { border-color: #27ae60; color: #27ae60; }

        .result-text {
            font-size: 16px;
            line-height: 1.7;
            color: var(--text);
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 24px;
        }

        /* Loading dots */
        .loading-dots span {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            margin: 0 3px;
            animation: bounce 1.2s infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 300;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--text);
            color: white;
            padding: 10px 22px;
            border-radius: 10px;
            font-size: 13px;
            font-family: 'Outfit', sans-serif;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 100;
            pointer-events: none;
        }

        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Responsive */
        @media (max-width: 560px) {
            body { padding: 24px 12px 32px; }
            .logo h1 { font-size: 22px; }
            .card-body { padding: 20px; }
            .result-area { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">译</div>
                <h1 id="title">Claude Translator</h1>
            </div>
            <div class="lang-toggle">
                <button class="lang-btn" id="langToggleBtn" aria-label="Switch UI language">
                    <span id="langLabel">EN</span> ▾
                </button>
                <div class="lang-dropdown" id="langDropdown">
                    <button onclick="setUI('zh')">中文</button>
                    <button onclick="setUI('en')">English</button>
                    <button onclick="setUI('ja')">日本語</button>
                </div>
            </div>
        </header>

        <div class="card">
            <div class="card-body">
                <div class="input-group">
                    <label id="inputLabel">Source Text</label>
                    <textarea
                        id="inputText"
                        placeholder="Enter text in any language..."
                        maxlength="5000"
                        oninput="updateCharCount()"
                    ></textarea>
                    <span class="char-count" id="charCount">0 / 5000</span>
                </div>

                <div class="controls">
                    <div class="select-wrap">
                        <select id="targetLang" aria-label="Target language"></select>
                    </div>
                    <button class="mic-btn" id="micBtn" onclick="toggleRecord()" title="Voice input">
                        🎤
                    </button>
                </div>

                <button class="translate-btn" id="translateBtn" onclick="doTranslate()">
                    <span id="translateLabel">Translate</span>
                </button>
            </div>

            <div class="result-area" id="resultArea">
                <div class="result-header">
                    <span class="result-label" id="resultLabel">Translation</span>
                    <button class="copy-btn" id="copyBtn" onclick="copyResult()">Copy</button>
                </div>
                <div class="result-text" id="resultText"></div>
            </div>
        </div>

        <div class="footer" id="footer">Powered by Claude &middot; Anthropic</div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ─── Configuration ───
        const API_BASE = 'https://t-dbdd-production-1dd4.up.railway.app';

        const LANGS = [
            { value: 'English',  zh: '英文',    en: 'English',  ja: '英語'   },
            { value: 'Chinese',  zh: '中文',    en: 'Chinese',  ja: '中国語' },
            { value: 'Japanese', zh: '日文',    en: 'Japanese', ja: '日本語' },
            { value: 'Korean',   zh: '韩文',    en: 'Korean',   ja: '韓国語' },
            { value: 'French',   zh: '法文',    en: 'French',   ja: 'フランス語' },
            { value: 'Spanish',  zh: '西班牙文', en: 'Spanish',  ja: 'スペイン語' },
            { value: 'German',   zh: '德文',    en: 'German',   ja: 'ドイツ語' },
            { value: 'Russian',  zh: '俄文',    en: 'Russian',  ja: 'ロシア語' },
            { value: 'Portuguese', zh: '葡萄牙文', en: 'Portuguese', ja: 'ポルトガル語' },
            { value: 'Arabic',   zh: '阿拉伯文', en: 'Arabic',   ja: 'アラビア語' },
        ];

        const UI_STRINGS = {
            zh: {
                title: 'Claude 翻译官',
                inputLabel: '原文',
                placeholder: '输入任意语言的文字…',
                translateBtn: '翻译',
                resultLabel: '译文',
                copy: '复制',
                copied: '已复制',
                langLabel: '中文',
                footer: '由 Claude 驱动 · Anthropic',
                toPrefix: '翻译成',
                micStart: '🎤',
                micStop: '🔴',
                recognizing: '⏳',
                micError: '无法访问麦克风，请检查权限',
                transcribeError: '语音识别失败，请重试',
                emptyWarn: '请输入要翻译的内容',
                connectError: '连接失败，请稍后重试',
            },
            en: {
                title: 'Claude Translator',
                inputLabel: 'Source Text',
                placeholder: 'Enter text in any language...',
                translateBtn: 'Translate',
                resultLabel: 'Translation',
                copy: 'Copy',
                copied: 'Copied!',
                langLabel: 'EN',
                footer: 'Powered by Claude · Anthropic',
                toPrefix: 'To ',
                micStart: '🎤',
                micStop: '🔴',
                recognizing: '⏳',
                micError: 'Cannot access microphone. Check permissions.',
                transcribeError: 'Transcription failed. Please retry.',
                emptyWarn: 'Please enter text to translate.',
                connectError: 'Connection failed. Please try again later.',
            },
            ja: {
                title: 'Claude 翻訳',
                inputLabel: '原文',
                placeholder: '任意の言語でテキストを入力…',
                translateBtn: '翻訳',
                resultLabel: '翻訳結果',
                copy: 'コピー',
                copied: 'コピー済み',
                langLabel: '日本語',
                footer: 'Claude 搭載 · Anthropic',
                toPrefix: '',
                micStart: '🎤',
                micStop: '🔴',
                recognizing: '⏳',
                micError: 'マイクにアクセスできません。',
                transcribeError: '音声認識に失敗しました。',
                emptyWarn: '翻訳するテキストを入力してください。',
                connectError: '接続に失敗しました。',
            }
        };

        // ─── State ───
        let currentLang = 'en';
        let recording = false;
        let mediaRecorder = null;
        let audioChunks = [];

        // ─── Init ───
        function init() {
            const saved = localStorage.getItem('uiLang');
            if (saved && UI_STRINGS[saved]) currentLang = saved;
            buildLangSelect();
            setUI(currentLang);
            document.getElementById('inputText').addEventListener('keydown', e => {
                if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') doTranslate();
            });
        }

        function buildLangSelect() {
            const select = document.getElementById('targetLang');
            select.innerHTML = '';
            LANGS.forEach((l, i) => {
                const opt = document.createElement('option');
                opt.value = l.value;
                select.appendChild(opt);
            });
        }

        // ─── UI Language ───
        function setUI(lang) {
            currentLang = lang;
            localStorage.setItem('uiLang', lang);
            const t = UI_STRINGS[lang];
            document.getElementById('title').textContent = t.title;
            document.getElementById('inputLabel').textContent = t.inputLabel;
            document.getElementById('inputText').placeholder = t.placeholder;
            document.getElementById('translateLabel').textContent = t.translateBtn;
            document.getElementById('resultLabel').textContent = t.resultLabel;
            document.getElementById('copyBtn').textContent = t.copy;
            document.getElementById('langLabel').textContent = t.langLabel;
            document.getElementById('footer').textContent = t.footer;
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : lang === 'ja' ? 'ja' : 'en';

            // Update select options
            const select = document.getElementById('targetLang');
            LANGS.forEach((l, i) => {
                const suffix = lang === 'ja' ? `${l.ja}に翻訳` : `${t.toPrefix}${l[lang]}`;
                select.options[i].text = suffix;
            });

            closeLangDropdown();
        }

        // ─── Char Count ───
        function updateCharCount() {
            const len = document.getElementById('inputText').value.length;
            document.getElementById('charCount').textContent = `${len} / 5000`;
        }

        // ─── Translate ───
        async function doTranslate() {
            const text = document.getElementById('inputText').value.trim();
            const t = UI_STRINGS[currentLang];
            if (!text) return showToast(t.emptyWarn);

            const targetLang = document.getElementById('targetLang').value;
            const btn = document.getElementById('translateBtn');
            const resultArea = document.getElementById('resultArea');
            const resultText = document.getElementById('resultText');

            btn.disabled = true;
            resultArea.classList.add('visible');
            resultText.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';

            try {
                const res = await fetch(`${API_BASE}/translate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, targetLang })
                });
                if (!res.ok) throw new Error('Network error');
                const data = await res.json();
                resultText.textContent = data.result || data.error || 'No result';
            } catch (err) {
                resultText.textContent = t.connectError;
            } finally {
                btn.disabled = false;
            }
        }

        // ─── Copy ───
        function copyResult() {
            const text = document.getElementById('resultText').textContent;
            const t = UI_STRINGS[currentLang];
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = t.copied;
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = t.copy;
                    btn.classList.remove('copied');
                }, 1500);
            });
        }

        // ─── Voice Recording ───
        async function toggleRecord() {
            const btn = document.getElementById('micBtn');
            const t = UI_STRINGS[currentLang];

            if (recording) {
                mediaRecorder.stop();
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    stream.getTracks().forEach(t => t.stop());
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const formData = new FormData();
                    formData.append('audio', blob, 'recording.webm');

                    btn.textContent = t.recognizing;
                    btn.disabled = true;

                    try {
                        const res = await fetch(`${API_BASE}/transcribe`, { method: 'POST', body: formData });
                        if (!res.ok) throw new Error();
                        const data = await res.json();
                        document.getElementById('inputText').value = data.result || '';
                        updateCharCount();
                    } catch {
                        showToast(t.transcribeError);
                    } finally {
                        btn.textContent = t.micStart;
                        btn.classList.remove('recording');
                        btn.disabled = false;
                        recording = false;
                    }
                };

                mediaRecorder.start();
                recording = true;
                btn.textContent = t.micStop;
                btn.classList.add('recording');
            } catch {
                showToast(t.micError);
            }
        }

        // ─── Language Dropdown ───
        document.getElementById('langToggleBtn').addEventListener('click', e => {
            e.stopPropagation();
            document.getElementById('langDropdown').classList.toggle('open');
        });

        function closeLangDropdown() {
            document.getElementById('langDropdown').classList.remove('open');
        }

        document.addEventListener('click', closeLangDropdown);

        // ─── Toast ───
        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2200);
        }

        // ─── Go ───
        init();
    </script>
</body>
</html>
